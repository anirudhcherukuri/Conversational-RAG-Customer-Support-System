services:
  # FastAPI Backend Service
  - type: web
    name: conversational-rag-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false # User will set this in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.9
    # Option: To persist ChromaDB between restarts on Render, you can mount a persistent disk:
    # hasDisk: true
    # disk:
    #   name: chroma-db-data
    #   mountPath: /opt/render/project/src/backend/chroma_db
    #   sizeGB: 1
